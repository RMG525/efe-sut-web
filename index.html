<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EFE Süt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Doğal Gıda</h1>
        
        <div class="sepet-alani">
            <h3>🛒 Sepetiniz</h3>
            
            <ul id="sepet-listesi"></ul>
            
            <p id="sepet-sayaci">Sepetiniz boş.</p>
            <button id="siparisi-tamamla">Sepeti Onayla ve WhatsApp'tan Sipariş Ver</button>
        </div>
    </header>

    <main>
        <section>
            <h2>Öne Çıkan Ürünler</h2>
            
            <div class="urun-katalogu">
                <article>
                    <img src="https://via.placeholder.com/200" alt="Bal">
                    <h3>Organik Çiçek Balı</h3>
                    <p>Fiyat: 250 TL</p>
                    <button class="sepete-ekle-butonu" data-urun="Organik Çiçek Balı" data-fiyat="250">Sepete Ekle</button>
                </article>

                <article>
                    <img src="https://via.placeholder.com/200" alt="Süt">
                    <h3>Günlük Taze Süt (3L)</h3>
                    <p>Fiyat: 120 TL</p>
                    <button class="sepete-ekle-butonu" data-urun="Günlük Taze Süt (3L)" data-fiyat="120">Sepete Ekle</button>
                </article>

                <article>
                    <img src="https://via.placeholder.com/200" alt="Tereyağı">
                    <h3>Köy Tereyağı (500g)</h3>
                    <p>Fiyat: 180 TL</p>
                    <button class="sepete-ekle-butonu" data-urun="Köy Tereyağı (500g)" data-fiyat="180">Sepete Ekle</button>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <div class="sosyal-medya">
            <a href="INSTAGRAM_LINKI" target="_blank">Instagram'da Bizi Takip Edin</a> | 
            <a href="FACEBOOK_LINKI" target="_blank">Facebook Sayfamız</a>
        </div>
        <p>© 2026 EFE Süt. Tüm hakları saklıdır.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
